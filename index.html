<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows 11 Simulator</title>
    <script>
      // Safety check to prevent libraries from overwriting read-only window.fetch
      if (typeof window !== 'undefined') {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: false,
            enumerable: true,
            get: () => originalFetch,
            set: () => {
              console.warn('Attempt to overwrite window.fetch blocked.');
            }
          });
        } catch (e) {
          // If defineProperty fails, we just hope for the best
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
